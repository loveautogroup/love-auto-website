<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="280" height="100">
  <!-- Love Auto Group — Primary Logo (Dark Background) -->
  <!-- Red LOVE, white AUTO GROUP, white SINCE 2014 -->
  <defs>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0"/>
      <stop offset="30%" stop-color="#dc2626" stop-opacity="1"/>
      <stop offset="70%" stop-color="#dc2626" stop-opacity="1"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- LOVE -->
  <text x="140" y="44" text-anchor="middle" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="42" fill="#dc2626" letter-spacing="6">LOVE</text>
  <!-- Accent gradient line -->
  <rect x="70" y="52" width="140" height="2.5" rx="1.25" fill="url(#accent-line)"/>
  <!-- AUTO GROUP -->
  <text x="140" y="72" text-anchor="middle" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="600" font-size="14" fill="#ffffff" letter-spacing="10">AUTO GROUP</text>
  <!-- SINCE 2014 -->
  <text x="140" y="88" text-anchor="middle" font-family="'Inter', 'Arial', sans-serif" font-weight="400" font-size="8.5" fill="#666666" letter-spacing="3">SINCE 2014</text>
</svg>
