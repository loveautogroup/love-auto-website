name: Security headers regression check

# SEC-L4 (Sam, 2026-05-05). Probes all three production surfaces after
# every deploy + on a daily cron. Asserts the required security headers
# are present on each. Catches:
#   - someone deleting the public/_headers file
#   - next.config.ts headers() block being removed or edited
#   - the Railway middleware getting reverted
#   - a Cloudflare/Vercel UI override silently dropping a header

on:
  schedule:
    - cron: "30 13 * * *"  # 13:30 UTC daily (~8:30am Central)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "public/_headers"
      - "next.config.ts"
      - ".github/workflows/security-headers-check.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: website
            url: https://www.loveautogroup.net/
            require: HSTS,X-Content-Type-Options,X-Frame-Options,Referrer-Policy,Content-Security-Policy,Permissions-Policy
          - name: dms
            url: https://dms.loveautogroup.net/login
            require: HSTS,X-Content-Type-Options,X-Frame-Options,Referrer-Policy,Content-Security-Policy,Permissions-Policy
          - name: railway-api
            url: https://web-production-d5f3a.up.railway.app/healthz
            require: HSTS,X-Content-Type-Options,X-Frame-Options,Referrer-Policy
    steps:
      - name: Probe ${{ matrix.target.name }}
        run: |
          set -e
          HEADERS=$(curl -sI -L --max-time 15 "${{ matrix.target.url }}")
          echo "$HEADERS"
          MISSING=""
          IFS=',' read -ra REQS <<< "${{ matrix.target.require }}"
          for header in "${REQS[@]}"; do
            case "$header" in
              HSTS) needle="strict-transport-security" ;;
              *)    needle=$(echo "$header" | tr '[:upper:]' '[:lower:]') ;;
            esac
            if ! echo "$HEADERS" | grep -qi "^$needle:"; then
              MISSING="$MISSING $header"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required headers on ${{ matrix.target.name }}:$MISSING"
            exit 1
          fi
          echo "✅ All required headers present on ${{ matrix.target.name }}"
